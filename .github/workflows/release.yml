name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (with or without leading v). Leave blank to auto-bump patch from latest release tag.'
        required: false
        default: ''
      publish:
        description: 'Sign + notarize, create tag, publish GitHub Release, update brew tap.'
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  resolve:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      release: ${{ steps.compute.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version + release flag
        id: compute
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUBLISH: ${{ inputs.publish }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Strip ALL leading 'v' chars so 'vv0.1.0' (typo) and 'v0.1.0' both normalize to '0.1.0'.
          strip_v() {
            local s="$1"
            while [[ "$s" == v* ]]; do s="${s#v}"; done
            echo "$s"
          }

          # Strict semver-ish: X.Y.Z optionally followed by -prerelease and/or +build.
          validate() {
            if [[ ! "$1" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid version: '$1' (must be X.Y.Z[-suffix][+build])" >&2
              exit 1
            fi
          }

          # Latest published release tag from GitHub (vX.Y.Z form). Empty if none.
          last_tag() {
            gh release view --repo "${GITHUB_REPOSITORY}" --json tagName -q .tagName 2>/dev/null \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true
          }

          bump_patch() {
            local base="$1"
            IFS=. read -r maj min pat <<<"$base"
            echo "${maj}.${min}.$((pat + 1))"
          }

          release=false
          version=""

          case "$EVENT_NAME" in
            push)
              if [[ "$REF_TYPE" == "tag" ]]; then
                version="$(strip_v "$REF_NAME")"
                release=true
              else
                # Push to main: build-only CI signal, never auto-release.
                # Release by pushing a v* tag or running workflow_dispatch.
                base="$(last_tag)"
                base="${base#v}"
                version="${base:-0.0.0}-dev.${GITHUB_SHA::7}"
                release=false
              fi
              ;;
            workflow_dispatch)
              if [[ -z "$INPUT_VERSION" ]]; then
                base="$(last_tag)"
                if [[ -z "$base" ]]; then
                  version="0.1.0"
                else
                  version="$(bump_patch "${base#v}")"
                fi
              else
                version="$(strip_v "$INPUT_VERSION")"
              fi
              release="$INPUT_PUBLISH"
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME" >&2
              exit 1
              ;;
          esac

          validate "$version"

          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$version tag=$tag release=$release"

  build:
    name: build ${{ matrix.target.os }}/${{ matrix.target.arch }}
    needs: resolve
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: darwin,  arch: arm64, runner: macos-14,      ext: ''     }
          - { os: darwin,  arch: amd64, runner: macos-14,      ext: ''     }
          - { os: linux,   arch: amd64, runner: ubuntu-latest, ext: ''     }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm, ext: '' }
          - { os: windows, arch: amd64, runner: windows-latest, ext: '.exe' }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Linux build dependencies
        if: matrix.target.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbcommon-dev libxkbcommon-x11-dev libasound2-dev

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: '1'
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          mkdir -p out
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "out/gosaid${{ matrix.target.ext }}" \
            ./cmd/gosaid

      - name: Import macOS signing certificate
        if: matrix.target.os == 'darwin'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}
          keychain-password: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}

      - name: Sign + notarize macOS binary
        if: matrix.target.os == 'darwin' && needs.resolve.outputs.release == 'true'
        shell: bash
        env:
          MACOS_DEVELOPER_ID_APPLICATION: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: ./scripts/sign-notarize.sh out/gosaid

      - name: Package
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          OS: ${{ matrix.target.os }}
          ARCH: ${{ matrix.target.arch }}
          EXT: ${{ matrix.target.ext }}
        run: |
          set -euo pipefail
          stem="gosaid-${VERSION}-${OS}-${ARCH}"
          mkdir -p "dist/${stem}"
          cp "out/gosaid${EXT}" "dist/${stem}/"
          cp LICENSE README.md "dist/${stem}/" 2>/dev/null || true
          cp -r examples "dist/${stem}/" 2>/dev/null || true

          cd dist
          if [[ "$OS" == "windows" ]]; then
            archive="${stem}.zip"
            if command -v 7z >/dev/null; then
              7z a -tzip "$archive" "$stem" >/dev/null
            else
              zip -r -q "$archive" "$stem"
            fi
          else
            archive="${stem}.tar.gz"
            tar -czf "$archive" "$stem"
          fi

          rm -rf "$stem"

          if command -v shasum >/dev/null; then
            shasum -a 256 "$archive" > "$archive.sha256"
          else
            sha256sum "$archive" > "$archive.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gosaid-${{ needs.resolve.outputs.version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: dist/*
          retention-days: 7

  release:
    name: publish release + update brew tap
    needs: [resolve, build]
    if: needs.resolve.outputs.release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve.outputs.version }}
      TAG_NAME: ${{ needs.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag (non-tag refs)
        if: github.ref_type != 'tag'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags --exit-code origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists on origin — refusing to overwrite." >&2
            exit 1
          fi
          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts and build checksums.txt
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -mindepth 2 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} dist/ \;
          cd dist
          # Single combined checksum file (overwrites the per-artifact ones in the release listing).
          sha256sum gosaid-*.tar.gz gosaid-*.zip 2>/dev/null > checksums.txt
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            dist/gosaid-*.tar.gz
            dist/gosaid-*.zip
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Update Homebrew tap
        shell: bash
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/dist
          TAP_REPO: dmtrkzntsv/homebrew-tap
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/update-brew-formula.sh
